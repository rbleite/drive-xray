name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel earlier runs on the same ref — the most recent push wins.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = arm64 (Apple Silicon), macos-15-intel = x86_64 (Intel;
        # macos-13 was retired by GitHub in Dec 2025, macos-15-intel is the
        # last Intel image, supported until Aug 2027),
        # windows-latest = x86_64-pc-windows-msvc (AVX2 blake2b_simd).
        os: [macos-14, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: build (release)
        working-directory: rust
        run: cargo build --release --locked

      - name: unit + integration tests
        working-directory: rust
        # Excludes the parity job's tests/parity.rs which require Python.
        # Those run in the `parity` job below.
        run: cargo test --release --workspace
                    -- --skip rust_and_python_produce_equivalent_index
                       --skip rust_db_opens_in_python_dedupe
                       --skip python_db_opens_in_rust_dedupe

      - name: dx --version sanity
        shell: bash
        run: |
          [ "$RUNNER_OS" = "Windows" ] && EXT=".exe" || EXT=""
          "./rust/target/release/dx${EXT}" --version

  pytest:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest included on purpose: it catches path-separator and
        # drive-letter bugs the macOS/Linux jobs can't see.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install deps
        run: pip install -r requirements.txt pytest

      - name: run Python test suite
        # Rust-parity tests auto-skip when the dx binary isn't built.
        run: pytest -q tests/

  parity:
    name: parity Python ↔ Rust
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # Different key so we don't trash the rust job's cache.
          prefix-key: "parity"

      - name: create venv with streamlit deps
        # tests/parity.rs auto-skips when .venv/bin/python isn't there; we
        # populate it so the suite actually runs in CI.
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install streamlit openpyxl plotly pyyaml

      - name: cargo test (parity only)
        working-directory: rust
        run: cargo test --release --test parity
